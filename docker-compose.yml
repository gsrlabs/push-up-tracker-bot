services:
  postgres:
    image: docker.io/library/postgres:18
    container_name: pushup-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-pushup_user}
      POSTGRES_DB: ${DB_NAME:-pushup_tracker}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: ${TIME_ZONE:-Europe/Moscow}

    ports:
      - "127.0.0.1:5432:5432" # for tests
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pushup_user} -d ${DB_NAME:-pushup_tracker}"]
      interval: 30s
      timeout: 10s
      retries: 3

  bot:
    build:
      context: ./backend
      args:
        - TIME_ZONE=${TIME_ZONE}
    container_name: pushup-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/config

volumes:
  postgres_data:
