# Database configuration
database:
  host: postgres
  port: 5432
  sslmode: disable
  max_conns: 10
  min_conns: 2

# Migrations configuration
migrations:
  path: ./migrations
  auto: true

# Application configuration
app:
  debug_mod: false
  timezone: Europe/Moscow

# Test configuration
test:
  db_host: localhost
  migrations_path: ../migrations